kind = "web"
previewPath = "/"
title = "CarbonPulse"
version = "1.0.0"
id = "artifacts/carbonpulse"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20184

[services.development]
run = "pnpm --filter @workspace/carbonpulse run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/carbonpulse", "run", "build" ]
publicDir = "artifacts/carbonpulse/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20184"
BASE_PATH = "/"
